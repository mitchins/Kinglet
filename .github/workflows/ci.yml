name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24
  WRANGLER_VERSION: 4.94.0

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python 3.12 (matches CloudFlare Workers Pyodide)
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync --all-extras --dev

    - name: Set up Node.js (required for wrangler/miniflare)
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install wrangler (required for complete test suite)
      run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

    - name: Lint with ruff (strict on production code)
      run: |
        uv run ruff check kinglet/ --select=E9,F63,F7,F82,F811,F821,E722
        uv run ruff check . --select=E9,F63,F7,F82,F811,F821 || true
        uv run ruff format --check . || true

    - name: Type check with mypy (advisory)
      run: |
        set +e
        uv run mypy kinglet/
        status=$?
        if [ "$status" -ne 0 ]; then
          echo "::warning::mypy is advisory until the existing package-wide type debt is reduced."
        fi
        exit 0

    - name: Run tests
      run: |
        uv run pytest --cov=kinglet --cov-branch --cov-report=xml --cov-report=term-missing --junitxml=test-results.xml

    - name: Upload test reports for downstream analysis
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: test-reports
        path: |
          coverage.xml
          test-results.xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync

    - name: Build package
      run: |
        uv build

    - name: Verify build artifacts
      run: |
        ls -la dist/
        uv run python -c "import kinglet; print(f'Kinglet version: {kinglet.__version__}')"

  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Run security checks with bandit (medium+ confidence)
      run: |
        uv run bandit -r kinglet/ -ii -f json -o bandit-report.json
        uv run bandit -r kinglet/ -ii  # Also show human-readable output

    - name: Upload security reports for downstream analysis
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: security-reports
        path: bandit-report.json

    - name: Check for known vulnerabilities in dependencies
      run: |
        uv export --no-dev --no-hashes -o /tmp/kinglet-prod-requirements.txt
        uv run safety check -r /tmp/kinglet-prod-requirements.txt

  sonarqube:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: Download test reports
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: test-reports
        path: .

    - name: Download security reports
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: security-reports
        path: .

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: SonarQube Quality Gate check
      uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
