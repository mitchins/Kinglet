name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  WRANGLER_VERSION: 4.94.0

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python 3.12 (matches CloudFlare Workers Pyodide)
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync --all-extras --dev

    - name: Set up Node.js (required for wrangler/miniflare)
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '20'

    - name: Install wrangler (required for complete test suite)
      run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

    - name: Lint with ruff (strict on production code)
      run: |
        uv run ruff check kinglet/ --select=E9,F63,F7,F82,F811,F821,E722
        uv run ruff check . --select=E9,F63,F7,F82,F811,F821 || true
        uv run ruff format --check . || true

    - name: Type check with mypy
      run: |
        uv run mypy kinglet/

    - name: Run tests
      run: |
        uv run pytest --cov=kinglet --cov-branch --cov-report=xml --cov-report=term-missing

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync

    - name: Build package
      run: |
        uv build

    - name: Verify build artifacts
      run: |
        ls -la dist/
        uv run python -c "import kinglet; print(f'Kinglet version: {kinglet.__version__}')"

  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        persist-credentials: false
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: Install uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --dev

    - name: Run security checks with bandit
      run: |
        uv run bandit -r kinglet/ -f json -o bandit-report.json
        uv run bandit -r kinglet/  # Also show human-readable output

    - name: Check for known vulnerabilities in dependencies
      run: |
        uv run safety check

  sonarqube:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        persist-credentials: false
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: Install uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Set up Node.js (required for wrangler/miniflare)
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '20'

    - name: Install wrangler (required for complete test suite)
      run: npm install -g wrangler@${{ env.WRANGLER_VERSION }}

    - name: Run tests with coverage for SonarQube
      run: |
        uv run pytest --cov=kinglet --cov-branch --cov-report=xml --junitxml=test-results.xml

    - name: Run security analysis
      run: |
        uv run bandit -r kinglet/ -f json -o bandit-report.json

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: SonarQube Quality Gate check
      uses: SonarSource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
